name: AI Evaluation

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: maven

      - name: Run AI evaluation tests
        env:
          CI_OPENAI_API_KEY: ${{ secrets.CI_OPENAI_API_KEY }}
        run: |
          chmod +x mvnw
          ./mvnw test -B --no-transfer-progress -Dtest=SearchAgentEvaluationTest
